apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payflow-frontend
  template:
    metadata:
      labels:
        app: payflow-frontend
    spec:
      containers:
      - name: frontend
        image: FRONTEND_IMAGE
        ports:
        - containerPort: 80
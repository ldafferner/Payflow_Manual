apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payflow-backend
  template:
    metadata:
      labels:
        app: payflow-backend
    spec:
      containers:
      - name: backend
        image: BACKEND_IMAGE
        ports:
        - containerPort: 3000
        envFrom:
          - configMapRef:
              name: payflow-backend-config
          - secretRef:
              name: payflow-backend-secret
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
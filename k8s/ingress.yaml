apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: payflow-backend
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: payflow-frontend
            port:
              number: 80